name: Manage Users

on:
  workflow_dispatch:
    inputs:
      action:
        description: "追加 or 削除"
        required: true
        type: choice
        options:
          - add
          - remove
      userNames:
        description: "VRChat display names / 1行に1人"
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  update-users:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update users.json
        run: |
          python3 << 'PY'
          import json
          import os

          path = "users.json"
          action = "${{ github.event.inputs.action }}"
          raw_names = """${{ github.event.inputs.userNames }}"""

          input_names = []
          for line in raw_names.replace(",", "\n").splitlines():
              name = line.strip()
              if name and name not in input_names:
                  input_names.append(name)

          if not input_names:
              raise ValueError("userNames is empty")

          if os.path.exists(path):
              with open(path, "r", encoding="utf-8") as f:
                  data = json.load(f)
          else:
              data = {"allowedUsers": []}

          users = data.get("allowedUsers", [])

          if action == "add":
              for name in input_names:
                  if name not in users:
                      users.append(name)

          elif action == "remove":
              users = [u for u in users if u not in input_names]

          else:
              raise ValueError("Unknown action")

          data["allowedUsers"] = users

          with open(path, "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
              f.write("\n")

          print(json.dumps(data, ensure_ascii=False, indent=2))
          print("Input count:", len(input_names))
          print("User count:", len(users))
          PY

      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add users.json

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes"
            exit 0
          fi

          git commit -m "Update allowed users"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages Deploy
        if: steps.commit.outputs.changed == 'true'
        run: |
          gh workflow run deploy-pages.yml
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Show users.json URL
        run: |
          echo "=================================="
          echo "users.json URL:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/users.json"
          echo "=================================="
